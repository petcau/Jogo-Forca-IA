<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jornada do Saber - Jogo da Forca</title>
    <style>
        /* CSS: Estilos visuais do jogo */
        :root {
            --cor-nivel1: #2ecc71; /* Verde Explorador */
            --cor-nivel2: #f1c40f; /* Amarelo Criador */
            --cor-nivel3: #9b59b6; /* Roxo Inovador */
            --fundo: #f0f4f8;
            --texto: #2c3e50;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--fundo);
            color: var(--texto);
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 10px;
        }

        .painel-superior {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 600px;
            background: white;
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            box-sizing: border-box;
        }

        .container {
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 600px;
            width: 100%;
            text-align: center;
            border-top: 10px solid var(--cor-nivel1);
            transition: border-color 0.5s;
            box-sizing: border-box;
        }

        .forca-svg {
            height: 150px;
            stroke: #444;
            stroke-width: 4;
            fill: none;
        }

        #palavra-exibida {
            font-size: 2.2rem;
            letter-spacing: 10px;
            margin: 15px 0;
            color: #34495e;
            font-weight: bold;
            min-height: 50px;
        }

        .area-dica {
            background: #ecf0f1;
            padding: 10px;
            border-radius: 10px;
            margin: 10px 0;
            min-height: 45px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .teclado {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(35px, 1fr));
            gap: 5px;
            margin-top: 15px;
        }

        .tecla {
            padding: 12px 2px;
            font-weight: bold;
            border: 1px solid #ccc;
            background: #fff;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
        }

        .tecla:disabled { opacity: 0.3; cursor: not-allowed; }
        .tecla.correta { background: #2ecc71; color: white; }
        .tecla.errada { background: #e74c3c; color: white; }

        .btn-acao {
            background: #3498db;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
            font-weight: bold;
            font-size: 1rem;
        }

        .oculto { display: none; }
    </style>
</head>
<body>

    <div class="painel-superior">
        <div>Nível: <span id="label-nivel" style="font-weight: bold;">Carregando...</span></div>
        <div>Pontos: <span id="pontos" style="font-weight: bold;">0</span></div>
    </div>

    <div class="container" id="game-container">
        <!-- Desenho da Forca -->
        <svg class="forca-svg" viewBox="0 0 200 180">
            <path d="M20,160 L180,160 M50,160 L50,20 L120,20 L120,40" />
            <circle id="corpo-0" cx="120" cy="55" r="15" class="oculto" />
            <line id="corpo-1" x1="120" y1="70" x2="120" y2="120" class="oculto" />
            <line id="corpo-2" x1="120" y1="80" x2="100" y2="100" class="oculto" />
            <line id="corpo-3" x1="120" y1="80" x2="140" y2="100" class="oculto" />
            <line id="corpo-4" x1="120" y1="120" x2="100" y2="150" class="oculto" />
            <line id="corpo-5" x1="120" y1="120" x2="140" y2="150" class="oculto" />
        </svg>

        <div id="palavra-exibida"></div>
        
        <div class="area-dica">
            <span id="texto-dica"></span>
            <button id="btn-pedir-dica" class="btn-acao oculto" onclick="revelarDica()">Ver Dica (-10 pts)</button>
        </div>

        <div class="teclado" id="teclado"></div>

        <div id="feedback" style="margin-top: 20px; font-weight: bold; min-height: 25px;"></div>
        <button id="btn-proximo" class="btn-acao oculto" onclick="proximaFase()">Próximo Desafio!</button>
    </div>

    <script>
        // --- LÓGICA DO JOGO ---

        let BANCO_PALAVRAS = {};
        let nivelAtual = 1;
        let faseNaDificuldade = 0;
        let pontos = 0;
        let palavraObjeto = {};
        let letrasTentadas = [];
        let erros = 0;
        let maxErros = 6;

        const cores = { 1: "#2ecc71", 2: "#f1c40f", 3: "#9b59b6" };
        const nomesNiveis = { 1: "Explorador", 2: "Criador", 3: "Inovador" };

        // Carrega o JSON e inicia
        async function carregarDadosEIniciar() {
            try {
                // Tenta buscar o arquivo local
                const resposta = await fetch('fases.json');
                if (!resposta.ok) throw new Error("Erro ao carregar arquivo");
                BANCO_PALAVRAS = await resposta.json();
                iniciarJogo();
            } catch (erro) {
                console.error(erro);
                document.getElementById("feedback").innerText = "Erro: Rode o jogo usando um Servidor Local (Live Server)!";
            }
        }

        function iniciarJogo() {
            palavraObjeto = BANCO_PALAVRAS[nivelAtual][faseNaDificuldade];
            letrasTentadas = [];
            erros = 0;
            maxErros = (nivelAtual === 3) ? 4 : 6;
            
            configurarInterface();
            desenharPalavra();
            criarTeclado();
        }

        function configurarInterface() {
            document.getElementById("game-container").style.borderColor = cores[nivelAtual];
            document.getElementById("label-nivel").innerText = nomesNiveis[nivelAtual];
            document.getElementById("label-nivel").style.color = cores[nivelAtual];
            document.getElementById("feedback").innerText = "";
            document.getElementById("btn-proximo").classList.add("oculto");
            
            const btnDica = document.getElementById("btn-pedir-dica");
            const txtDica = document.getElementById("texto-dica");
            
            if (nivelAtual === 1) {
                txtDica.innerText = "Dica: " + (palavraObjeto.d || "---");
                btnDica.classList.add("oculto");
            } else if (nivelAtual === 2) {
                txtDica.innerText = "";
                btnDica.classList.remove("oculto");
                btnDica.disabled = false;
            } else {
                txtDica.innerText = "Sem dicas neste nível!";
                btnDica.classList.add("oculto");
            }

            for(let i=0; i<6; i++) document.getElementById(`corpo-${i}`).classList.add("oculto");
        }

        function criarTeclado() {
            const teclado = document.getElementById("teclado");
            teclado.innerHTML = "";
            "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("").forEach(l => {
                const btn = document.createElement("button");
                btn.innerText = l;
                btn.classList.add("tecla");
                btn.id = `tecla-${l}`;
                btn.onclick = () => verificarLetra(l);
                teclado.appendChild(btn);
            });
        }

        function verificarLetra(letra) {
            if (letrasTentadas.includes(letra) || erros >= maxErros) return;
            letrasTentadas.push(letra);
            
            const btn = document.getElementById(`tecla-${letra}`);
            btn.disabled = true;

            if (palavraObjeto.p.includes(letra)) {
                btn.classList.add("correta");
                pontos += 10;
                desenharPalavra();
            } else {
                btn.classList.add("errada");
                if (document.getElementById(`corpo-${erros}`)) {
                    document.getElementById(`corpo-${erros}`).classList.remove("oculto");
                }
                erros++;
                if (erros >= maxErros) finalizarRodada(false);
            }
            document.getElementById("pontos").innerText = pontos;
        }

        function desenharPalavra() {
            const display = document.getElementById("palavra-exibida");
            let visual = "";
            let completo = true;
            for (let l of palavraObjeto.p) {
                if (letrasTentadas.includes(l)) {
                    visual += l + " ";
                } else {
                    visual += "_ ";
                    completo = false;
                }
            }
            display.innerText = visual;
            if (completo && palavraObjeto.p.length > 0) finalizarRodada(true);
        }

        function revelarDica() {
            if (pontos >= 10) {
                pontos -= 10;
                document.getElementById("texto-dica").innerText = "Dica: " + palavraObjeto.d;
                document.getElementById("btn-pedir-dica").disabled = true;
                document.getElementById("pontos").innerText = pontos;
            } else {
                alert("Você precisa de 10 pontos!");
            }
        }

        function finalizarRodada(venceu) {
            const feedback = document.getElementById("feedback");
            document.querySelectorAll(".tecla").forEach(b => b.disabled = true);
            if (venceu) {
                feedback.innerText = "🌟 Parabéns! Você acertou!";
                feedback.style.color = "green";
                pontos += 50;
            } else {
                feedback.innerText = "Ops! A palavra era: " + palavraObjeto.p;
                feedback.style.color = "red";
            }
            document.getElementById("pontos").innerText = pontos;
            document.getElementById("btn-proximo").classList.remove("oculto");
        }

        function proximaFase() {
            faseNaDificuldade++;
            if (faseNaDificuldade >= BANCO_PALAVRAS[nivelA
