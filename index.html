<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jornada do Saber - Jogo da Forca</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 1. TELA INICIAL -->
    <div id="tela-inicial" class="tela">
        <div class="card-inicial">
            <h1>Jornada do Saber</h1>
            <p>Você está pronto?</p>
            <button class="btn-principal pulse" onclick="começarJornada()">JOGAR</button>
        </div>
    </div>

    <!-- 2. TELA DO JOGO -->
    <div id="tela-jogo" class="tela oculto">
        <div class="painel-superior">
            <div class="info-grupo">
                <span class="label">Nível</span>
                <span id="label-nivel" class="valor">---</span>
            </div>
            <div id="progresso-fase" class="valor-fase">Fase 1/3</div>
            <div class="info-grupo">
                <span class="label">Pontos</span>
                <span id="pontos" class="valor">0</span>
            </div>
        </div>

        <div class="container" id="game-container">
            <div class="forca-box">
                <!-- SVG CORRIGIDO: Removido preenchimentos internos -->
                <svg class="forca-svg" viewBox="0 0 200 180">
                    <path d="M20,160 L180,160 M50,160 L50,20 L120,20 L120,40" />
                    <circle id="corpo-0" cx="120" cy="55" r="15" class="boneco" />
                    <line id="corpo-1" x1="120" y1="70" x2="120" y2="120" class="boneco" />
                    <line id="corpo-2" x1="120" y1="80" x2="100" y2="100" class="boneco" />
                    <line id="corpo-3" x1="120" y1="80" x2="140" y2="100" class="boneco" />
                    <line id="corpo-4" x1="120" y1="120" x2="100" y2="150" class="boneco" />
                    <line id="corpo-5" x1="120" y1="120" x2="140" y2="150" class="boneco" />
                </svg>
            </div>

            <div id="palavra-exibida"></div>
            
            <div class="area-dica">
                <span id="texto-dica"></span>
                <button id="btn-pedir-dica" class="btn-secundario oculto" onclick="revelarDica()">Dica (-10 pts)</button>
            </div>

            <div id="teclado" class="teclado"></div>

            <div id="feedback" class="feedback"></div>
            
            <div id="controles-final" class="oculto">
                <button id="btn-proximo" class="btn-principal" onclick="proximaFase()">Próxima Fase</button>
                <div class="grupo-botoes-mini">
                    <button class="btn-mini" onclick="reiniciarRodada()">Reiniciar</button>
                    <button class="btn-mini" onclick="voltarAoInicio()">Sair</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 3. MENSAGEM DE NÍVEL -->
    <div id="overlay-nivel" class="overlay oculto">
        <div class="modal-nivel">
            <h2 id="msg-titulo-nivel">Parabéns!</h2>
            <p id="msg-corpo-nivel">Você avançou!</p>
            <button class="btn-principal" onclick="fecharMensagemNivel()">Continuar</button>
        </div>
    </div>

    <script src="script.js" defer></script>
</body>
</html>
